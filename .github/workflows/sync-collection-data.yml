name: Sync collection data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Build collection JSON
        run: |
          set -e
          for config in sources/collections/*.json; do
            echo "Building ${config}"
            node scripts/build-collection-json.mjs "$config"
          done

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v7.1.0
        with:
          commit_message: Update collection data
          file_pattern: public/data/collections/**/*.json
